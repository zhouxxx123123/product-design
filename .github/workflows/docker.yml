# To enable push to GitHub Container Registry, add these secrets:
#   GHCR_TOKEN: a personal access token with write:packages scope
# Then uncomment the login and push steps below.
#
# Uncomment to enable GHCR login (all three build jobs):
#
#   - name: Log in to GitHub Container Registry
#     uses: docker/login-action@v3
#     with:
#       registry: ghcr.io
#       username: ${{ github.actor }}
#       password: ${{ secrets.GHCR_TOKEN }}
#
# Uncomment to enable image push (replace the echo step in each job):
#
#   - name: Push image
#     run: docker push ghcr.io/${{ github.repository_owner }}/liuguang-backend:${{ github.sha }}
#      (adjust service name per job: liuguang-frontend, liuguang-ai)

name: Docker Build

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build NestJS backend image
  # ─────────────────────────────────────────────
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: |
          docker build \
            -t liuguang-backend:${{ github.sha }} \
            ./backend

      # Uncomment below and remove this echo once GHCR is configured.
      - name: Image build summary
        run: echo "Backend image built: liuguang-backend:${{ github.sha }}"

  # ─────────────────────────────────────────────
  # Job 2: Build React frontend image
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        run: |
          docker build \
            -t liuguang-frontend:${{ github.sha }} \
            ./frontend

      - name: Image build summary
        run: echo "Frontend image built: liuguang-frontend:${{ github.sha }}"

  # ─────────────────────────────────────────────
  # Job 3: Build Python AI service image
  # ─────────────────────────────────────────────
  build-ai:
    name: Build AI service image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AI service Docker image
        run: |
          docker build \
            -t liuguang-ai:${{ github.sha }} \
            ./ai

      - name: Image build summary
        run: echo "AI service image built: liuguang-ai:${{ github.sha }}"
