<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4f1a93",
                        "background-light": "#f7f6f8",
                        "background-dark": "#181220",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<title>调研管理系统 - 新建调研会话</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="fixed inset-0 flex flex-col h-screen w-full overflow-hidden blur-sm pointer-events-none select-none">
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-10 py-3">
<div class="flex items-center gap-8">
<div class="flex items-center gap-4 text-primary">
<span class="material-symbols-outlined text-3xl">analytics</span>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold">调研管理系统</h2>
</div>
</div>
<div class="flex flex-1 justify-end gap-8">
<nav class="flex items-center gap-9">
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium">仪表盘</span>
<span class="text-primary text-sm font-bold">调研会话</span>
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium">客户管理</span>
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium">提纲模板</span>
</nav>
</div>
</header>
<main class="flex-1 max-w-5xl mx-auto w-full p-8">
<div class="flex justify-between items-center mb-6">
<h1 class="text-3xl font-bold">调研会话列表</h1>
<div class="bg-primary/10 text-primary px-4 py-2 rounded-lg font-medium">+ 新建会话</div>
</div>
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
<table class="w-full text-left">
<thead class="bg-slate-50 dark:bg-slate-800/50">
<tr>
<th class="px-6 py-4 text-sm font-semibold">会话名称</th>
<th class="px-6 py-4 text-sm font-semibold">关联客户</th>
<th class="px-6 py-4 text-sm font-semibold">计划时间</th>
<th class="px-6 py-4 text-sm font-semibold">状态</th>
</tr>
</thead>
<tbody class="divide-y divide-slate-100 dark:divide-slate-800">
<tr>
<td class="px-6 py-4">腾讯云架构讨论</td>
<td class="px-6 py-4">腾讯科技</td>
<td class="px-6 py-4">2023-10-24 14:00</td>
<td class="px-6 py-4"><span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs">进行中</span></td>
</tr>
<tr>
<td class="px-6 py-4">阿里钉钉调研</td>
<td class="px-6 py-4">阿里巴巴</td>
<td class="px-6 py-4">2023-10-25 10:00</td>
<td class="px-6 py-4"><span class="px-3 py-1 bg-slate-100 text-slate-700 rounded-full text-xs">未开始</span></td>
</tr>
</tbody>
</table>
</div>
</main>
</div>
<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 flex items-center justify-center p-4">
<div class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
<h3 class="text-xl font-bold text-slate-900 dark:text-slate-100">新建调研会话</h3>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="p-6 space-y-6">
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">关联客户</label>
<button class="text-sm font-medium text-primary hover:underline flex items-center gap-1">
<span class="material-symbols-outlined text-sm">person_add</span>
                            新建客户档案
                        </button>
</div>
<div class="relative group">
<select class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg py-3 px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary appearance-none transition-all">
<option value="">搜索并选择客户</option>
<option>腾讯科技 (Tencent)</option>
<option>阿里巴巴 (Alibaba)</option>
<option>字节跳动 (ByteDance)</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">选择提纲模板</label>
<div class="relative">
<select class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg py-3 px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary appearance-none">
<option>通用架构调研模板</option>
<option>需求访谈模板</option>
<option>竞品对标模板</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-sm">expand_more</span>
</div>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">计划调研时间</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg py-3 px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary" type="datetime-local" value="2023-10-27T14:30"/>
</div>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">参与部门</label>
<div class="flex flex-wrap gap-2 p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg min-h-[48px]">
<span class="flex items-center gap-1 bg-primary/10 text-primary px-3 py-1 rounded-full text-sm font-medium">
                            IT部 <span class="material-symbols-outlined text-xs cursor-pointer">close</span>
</span>
<span class="flex items-center gap-1 bg-primary/10 text-primary px-3 py-1 rounded-full text-sm font-medium">
                            财务部 <span class="material-symbols-outlined text-xs cursor-pointer">close</span>
</span>
<span class="flex items-center gap-1 bg-primary/10 text-primary px-3 py-1 rounded-full text-sm font-medium">
                            业务部 <span class="material-symbols-outlined text-xs cursor-pointer">close</span>
</span>
<div class="flex items-center text-slate-400 ml-1">
<span class="material-symbols-outlined text-xl">add_circle</span>
</div>
</div>
</div>
<div class="pt-4 border-t border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-2 text-slate-500 dark:text-slate-400 text-xs mb-6">
<span class="material-symbols-outlined text-sm text-primary">auto_awesome</span>
<p>觉得填表太麻烦？您可以直接唤起右下角 <span class="font-bold">OpenClaw</span> 告诉它：帮我建一个下周二针对腾讯云 IT 部门的调研会话...</p>
</div>
<div class="flex justify-end gap-3">
<button class="px-6 py-2.5 text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors border border-transparent">
                            取消
                        </button>
<button class="px-8 py-2.5 text-sm font-bold bg-primary text-white rounded-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">
                            确认创建
                        </button>
</div>
</div>
</div>
</div>
</div>
<div class="fixed bottom-6 right-6 z-50">
<button class="w-14 h-14 bg-primary text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all group relative">
<span class="material-symbols-outlined text-3xl">smart_toy</span>
<div class="absolute -top-12 right-0 bg-slate-900 text-white text-xs py-2 px-3 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
                OpenClaw Copilot 在此
                <div class="absolute bottom-[-4px] right-6 w-2 h-2 bg-slate-900 rotate-45"></div>
</div>
</button>
</div>
</body></html>
