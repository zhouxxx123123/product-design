<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4f1a93",
                        "background-light": "#f7f6f8",
                        "background-dark": "#181220",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans SC", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .bg-mesh {
            background-color: #f7f6f8;
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 26, 147, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(79, 26, 147, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 26, 147, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(79, 26, 147, 0.08) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-mesh min-h-screen flex flex-col font-display text-slate-900">
<div class="flex-1 flex items-center justify-center p-6">
<div class="w-full max-w-[440px] bg-white dark:bg-background-dark/50 backdrop-blur-xl rounded-xl shadow-2xl shadow-primary/10 border border-primary/5 p-8 md:p-10">
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-4xl">insights</span>
</div>
<h1 class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">中科琉光调研工具</h1>
<p class="text-slate-500 mt-2 text-sm">专业的调研分析管理系统</p>
</div>
<form class="space-y-5" id="login-form">
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">选择租户</label>
<div class="relative">
<select class="w-full h-12 pl-4 pr-10 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent appearance-none transition-all" id="tenant">
<option value="">请选择组织/渠道伙伴</option>
<option value="1">中科总部</option>
<option value="2">华东分中心</option>
<option value="3">渠道合作伙伴 A</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">账号</label>
<div class="relative group">
<div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">person</span>
</div>
<input class="w-full h-12 pl-10 pr-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="username" placeholder="请输入邮箱/用户名" type="text"/>
</div>
</div>
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">密码</label>
<div class="relative group">
<div class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full h-12 pl-10 pr-10 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="password" placeholder="请输入密码" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600" id="toggle-password" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-1">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-slate-900 transition-colors">记住我</span>
</label>
<a class="text-sm font-medium text-primary hover:underline underline-offset-4" href="#">忘记密码？</a>
</div>
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" id="login-btn" type="submit">
<span id="login-text">登录系统</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" id="login-icon">arrow_forward</span>
</button>
</form>
<script src="assets/common.js"></script>
<script>
            // 登录表单验证和提交
            const loginForm = document.getElementById('login-form');
            const tenantSelect = document.getElementById('tenant');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('toggle-password');
            const loginBtn = document.getElementById('login-btn');
            const loginText = document.getElementById('login-text');
            const loginIcon = document.getElementById('login-icon');

            // 密码可见性切换
            togglePasswordBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                togglePasswordBtn.querySelector('.material-symbols-outlined').textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });

            // 表单验证
            function validateForm() {
                let isValid = true;

                // 验证租户
                if (!tenantSelect.value) {
                    showError(tenantSelect, '请选择租户');
                    isValid = false;
                } else {
                    clearError(tenantSelect);
                }

                // 验证用户名
                if (!usernameInput.value.trim()) {
                    showError(usernameInput, '请输入账号');
                    isValid = false;
                } else {
                    clearError(usernameInput);
                }

                // 验证密码
                if (!passwordInput.value.trim()) {
                    showError(passwordInput, '请输入密码');
                    isValid = false;
                } else if (passwordInput.value.length < 6) {
                    showError(passwordInput, '密码至少6位');
                    isValid = false;
                } else {
                    clearError(passwordInput);
                }

                return isValid;
            }

            function showError(input, message) {
                input.classList.add('border-red-500', 'focus:border-red-500', 'focus:ring-red-500');
                input.classList.remove('border-slate-200', 'dark:border-slate-700', 'focus:border-primary', 'focus:ring-primary');

                // 查找或创建错误提示
                let errorEl = input.closest('div').parentElement.querySelector('.error-message');
                if (!errorEl) {
                    errorEl = document.createElement('p');
                    errorEl.className = 'error-message text-red-500 text-xs mt-1';
                    input.closest('div').parentElement.appendChild(errorEl);
                }
                errorEl.textContent = message;
            }

            function clearError(input) {
                input.classList.remove('border-red-500', 'focus:border-red-500', 'focus:ring-red-500');
                input.classList.add('border-slate-200', 'dark:border-slate-700', 'focus:border-primary', 'focus:ring-primary');

                const errorEl = input.closest('div').parentElement.querySelector('.error-message');
                if (errorEl) {
                    errorEl.remove();
                }
            }

            // 清除错误当输入时
            [tenantSelect, usernameInput, passwordInput].forEach(input => {
                input.addEventListener('input', () => clearError(input));
            });

            // 表单提交
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();

                if (!validateForm()) return;

                // 显示加载状态
                loginBtn.disabled = true;
                loginBtn.classList.add('opacity-70', 'cursor-not-allowed');
                loginText.textContent = '登录中...';
                loginIcon.textContent = 'progress_activity';
                loginIcon.classList.add('animate-spin');

                // 模拟登录请求
                setTimeout(() => {
                    // 恢复按钮状态
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                    loginText.textContent = '登录系统';
                    loginIcon.textContent = 'arrow_forward';
                    loginIcon.classList.remove('animate-spin');

                    // 显示成功提示
                    if (window.Toast) {
                        Toast.show('登录成功！正在跳转...', 'success');
                    } else {
                        alert('登录成功！');
                    }

                    // 实际项目中这里会跳转到首页
                    // window.location.href = '/dashboard';
                }, 1500);
            });
        </script>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-sm text-slate-500">
                    遇到问题？<a class="text-primary font-medium hover:underline" href="#">联系技术支持</a>
</p>
</div>
</div>
</div>

</footer>

<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">

</div>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200">OpenClaw Copilot</span>
<div class="flex space-x-1 ml-1">
<span class="w-1 h-1 rounded-full bg-green-500 animate-pulse"></span>
</div>
</button>
</div>
