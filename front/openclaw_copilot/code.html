</div>

<!-- Top Header -->

<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined !text-2xl">auto_awesome</span>
</div>
<div>
<h1 class="text-slate-900 dark:text-slate-100 font-bold text-lg leading-none">OpenClaw Copilot</h1>

</div>
</div>
<div class="flex items-center gap-2">

</button>

<!-- Chat Message Stream -->

<!-- System Message / Intro -->

<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center shrink-0">

</div>

</div>
</div>
<!-- User Message -->

<div class="bg-primary rounded-2xl rounded-tr-none px-4 py-3 max-w-[85%] shadow-md shadow-primary/10">

</div>
<div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 shrink-0 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile avatar icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6-EW8NXt8lfgalBojy5qvbxHWhwxqbBOrMZXfR419sb9G1uUjK6YHJX_VLYD5vny0G-4cB9925i2_bHDvw-fVqM-a20boDirZ7GJGyttaXJc81YBhhdTHIMN_kBaTpvoQrg6shuHmbbjkd4bRCk56X0l_paqb7X-29HG4QHW2O1PChI3oW-OuNkHvSzTrHp-JoXsAkpkO4Pv7nRAvvegeSnVtz526aJ_puDPdjWcqQ_mPz88aICDV3ACgb65le51PoG8ePweQjwSu"/>
</div>
</div>
<!-- Copilot Response with Action Preview Card -->
<div class="flex gap-3">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary !text-xl">smart_toy</span>
</div>
<div class="flex flex-col gap-3 w-full max-w-[90%]">
<div class="bg-background-light dark:bg-slate-800 rounded-2xl rounded-tl-none px-4 py-3">
<p class="text-sm text-slate-800 dark:text-slate-200 leading-relaxed">没问题。我已经根据调研记录自动生成了案例详情，请核对信息以执行归档。</p>
</div>
<!-- Action Preview Card -->
<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden shadow-sm">
<div class="bg-primary/5 px-4 py-2 border-b border-slate-100 dark:border-slate-700 flex items-center gap-2">
<span class="material-symbols-outlined text-primary !text-lg">task_alt</span>
<span class="text-xs font-bold text-primary tracking-wider">操作确认：创建案例并归档</span>
</div>
<div class="p-4 space-y-4">
<div class="space-y-3">
<div class="flex justify-between items-start">
<span class="text-xs text-slate-500 dark:text-slate-400">客户名称</span>
<span class="text-sm font-medium text-slate-900 dark:text-slate-100 text-right">某大型国有银行</span>
</div>
<div class="flex justify-between items-start">
<span class="text-xs text-slate-500 dark:text-slate-400">所属行业</span>
<span class="text-sm font-medium text-slate-900 dark:text-slate-100 text-right">金融</span>
</div>
<div class="flex justify-between items-start">
<span class="text-xs text-slate-500 dark:text-slate-400">功能分类</span>
<div class="flex flex-col items-end">
<span class="text-sm font-medium text-slate-900 dark:text-slate-100">风险管理</span>
<span class="text-[10px] text-slate-400 dark:text-slate-500">洗钱监测</span>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-3 pt-2">
<button class="bg-primary hover:bg-primary/90 text-white text-sm font-bold py-2.5 rounded-lg transition-all flex items-center justify-center gap-2">
                                        确认执行
                                    </button>
<button class="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 text-sm font-medium py-2.5 rounded-lg transition-all">
                                        修改 / 取消
                                    </button>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Footer Input Area -->
<div class="p-5 border-t border-slate-100 dark:border-slate-800">
<div class="relative flex flex-col gap-3">
<!-- Suggested Chips -->
<div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
<button class="whitespace-nowrap px-3 py-1.5 rounded-full border border-primary/20 text-xs text-primary bg-primary/5 hover:bg-primary/10 transition-colors">完善案例详情</button>
<button class="whitespace-nowrap px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-700 text-xs text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">导出为PDF</button>
<button class="whitespace-nowrap px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-700 text-xs text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">分享给同事</button>
</div>
<!-- Input Box -->
<div class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 rounded-2xl p-2 pl-4 border border-transparent focus-within:border-primary/30 focus-within:bg-white dark:focus-within:bg-slate-900 transition-all shadow-inner">
<input class="bg-transparent border-none focus:ring-0 flex-1 text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-500 py-2" placeholder="输入指令或长按语音输入..." type="text"/>
<div class="flex items-center gap-1">
<button class="w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/30 hover:scale-105 active:scale-95 transition-transform group relative">
<span class="material-symbols-outlined !text-2xl">mic</span>
<!-- Tooltip hint for long press -->
<div class="absolute bottom-full mb-3 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 pointer-events-none whitespace-nowrap transition-opacity">
                                    长按语音输入
                                </div>
</button>
<button class="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
<span class="material-symbols-outlined">attach_file</span>
</button>
</div>
</div>
</div>
<div class="mt-4 text-center">
<p class="text-[10px] text-slate-400 dark:text-slate-600">Copilot 可能会产生误差，请核查重要信息。</p>
</div>
</div>
</div>
</div>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script src="assets/common.js"></script>
<script>
        // Copilot对话功能
        const chatContainer = document.querySelector('.overflow-y-auto.p-5');
        const inputBox = document.querySelector('input[type="text"]');
        const micBtn = document.querySelector('button .material-symbols-outlined:first-child');
        const sendBtn = document.querySelector('button.shadow-lg');

        // 发送消息
        function sendMessage(text) {
            if (!text.trim()) return;

            // 添加用户消息
            addUserMessage(text);

            // 清空输入框
            inputBox.value = '';

            // 模拟AI回复
            setTimeout(() => {
                addAIMessage('收到您的请求，正在处理中...');
            }, 500);
        }

        function addUserMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'flex gap-3 justify-end animate-fade-in';
            msgDiv.innerHTML = `
                <div class="bg-primary rounded-2xl rounded-tr-none px-4 py-3 max-w-[85%] shadow-md shadow-primary/10">
                    <p class="text-sm text-white leading-relaxed">${text}</p>
                </div>
                <div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 shrink-0 overflow-hidden">
                    <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6-EW8NXt8lfgalBojy5qvbxHWhwxqbBOrMZXfR419sb9G1uUjK6YHJX_VLYD5vny0G-4cB9925i2_bHDvw-fVqM-a20boDirZ7GJGyttaXJc81YBhhdTHIMN_kBaTpvoQrg6shuHmbbjkd4bRCk56X0l_paqb7X-29HG4QHW2O1PChI3oW-OuNkHvSzTrHp-JoXsAkpkO4Pv7nRAvvegeSnVtz526aJ_puDPdjWcqQ_mPz88aICDV3ACgb65le51PoG8ePweQjwSu"/>
                </div>
            `;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addAIMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'flex gap-3 animate-fade-in';
            msgDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-primary !text-xl">smart_toy</span>
                </div>
                <div class="bg-background-light dark:bg-slate-800 rounded-2xl rounded-tl-none px-4 py-3 max-w-[85%]">
                    <p class="text-sm text-slate-800 dark:text-slate-200 leading-relaxed">${text}</p>
                </div>
            `;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 输入框回车发送
        inputBox?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage(inputBox.value);
            }
        });

        // 快捷按钮点击
        document.querySelectorAll('.whitespace-nowrap').forEach(btn => {
            btn.addEventListener('click', function() {
                const text = this.textContent.trim();
                if (text === '完善案例详情') {
                    addAIMessage('我来帮您完善案例详情。请告诉我需要补充哪些信息？');
                } else if (text === '导出为PDF') {
                    if (window.Toast) Toast.show('正在生成PDF...', 'info');
                    setTimeout(() => {
                        if (window.Toast) Toast.show('PDF导出成功！', 'success');
                    }, 1500);
                } else if (text === '分享给同事') {
                    if (window.Toast) Toast.show('已复制分享链接', 'success');
                }
            });
        });

        // 确认执行按钮
        document.querySelectorAll('.grid.grid-cols-2.gap-3 button').forEach((btn, index) => {
            btn.addEventListener('click', function() {
                if (index === 0) {
                    if (window.Toast) Toast.show('操作已执行！', 'success');
                    this.textContent = '已执行';
                    this.disabled = true;
                    this.classList.add('opacity-70');
                } else {
                    if (window.Toast) Toast.show('操作已取消', 'info');
                }
            });
        });

        // 语音输入长按
        let pressTimer;
        const voiceBtn = document.querySelector('.w-10.h-10.rounded-xl.bg-primary');

        voiceBtn?.addEventListener('mousedown', () => {
            pressTimer = setTimeout(() => {
                if (window.Toast) Toast.show('正在录音，请说话...', 'info');
                voiceBtn.querySelector('.material-symbols-outlined').textContent = 'graphic_eq';
                voiceBtn.classList.add('animate-pulse');
            }, 500);
        });

        voiceBtn?.addEventListener('mouseup', () => {
            clearTimeout(pressTimer);
            if (voiceBtn.querySelector('.material-symbols-outlined').textContent === 'graphic_eq') {
                // 停止录音
                voiceBtn.querySelector('.material-symbols-outlined').textContent = 'mic';
                voiceBtn.classList.remove('animate-pulse');
                if (window.Toast) Toast.show('录音已发送', 'success');
                sendMessage('（语音消息）');
            }
        });

        // 关闭按钮
        document.querySelector('button:has(.material-symbols-outlined):last-child')?.addEventListener('click', () => {
            if (window.Toast) Toast.show('关闭侧边栏', 'info');
        });

        // 内存管理按钮
        document.querySelector('button:has(.material-symbols-outlined):first-child')?.addEventListener('click', () => {
            if (window.Toast) Toast.show('打开内存管理', 'info');
        });
    </script>
</body></html>
