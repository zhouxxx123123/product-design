<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4f1a93",
                        "background-light": "#f7f6f8",
                        "background-dark": "#181220",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-link {
            background-color: #4f1a931a; /* bg-primary/10 */
            color: #4f1a93;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="flex h-screen overflow-hidden">
<!-- Zone A: Left Sidebar -->
<aside class="w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col shrink-0">
<!-- Top: Brand Logo -->
<div class="p-6 flex items-center gap-3">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">insights</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 font-bold text-lg leading-tight">中科琉光调研工具</h1>
</div>
<!-- Middle: Vertical Menu -->
<nav class="flex-1 px-4 py-4 space-y-1">
<div class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider px-3 mb-2">Sales Role</div>
<a class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg transition-colors group" href="#">
<span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">dashboard</span>
<span class="text-sm font-medium">工作台</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg transition-colors group" href="#">
<span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">folder_shared</span>
<span class="text-sm font-medium">客户档案</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 active-link rounded-lg transition-colors" href="#">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">chat</span>
<span class="text-sm font-semibold">调研会话</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg transition-colors group" href="#">
<span class="material-symbols-outlined text-slate-500 group-hover:text-primary transition-colors">manage_search</span>
<span class="text-sm font-medium">案例库检索</span>
</a>
</nav>
<!-- Bottom: User Info -->
<div class="p-4 border-t border-slate-200 dark:border-slate-800">
<div class="flex items-center justify-between group">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-slate-200 overflow-hidden border border-slate-100 dark:border-slate-700">
<img alt="Manager Zhang Avatar" class="w-full h-full object-cover" data-alt="Professional male manager profile photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD0Cz9WKgJL42Ru0osLKFCfQLRLJtDh4wrAJjdPSbxQCuQIOUWUdgskCyluOyZkchjEZu6u5sAIoC-AK85TBvX7B624qzC3Ye5SnB2eltZ4NThs_3WAH3c98CUgFbPcotWx_N_lJ8qNx4H5WRGcO6V_gOIxd60n9mV7sPs2EygZ6TeAn1jQILkBtZkiwx5IQjnyySc3gdFpbZX8uameNc4fHOmD2r9BmnBDCMD3ZC9iuLaHBnYejA5Hfpy0Y3flLKKS9eqjssFE7H3C"/>
</div>
<div class="flex flex-col">
<span class="text-sm font-bold text-slate-900 dark:text-slate-100">张经理</span>
<span class="text-xs text-slate-500 dark:text-slate-400">销售经理</span>
</div>
</div>
<button class="p-2 text-slate-400 hover:text-red-500 transition-colors" title="退出登录">
<span class="material-symbols-outlined">logout</span>
</button>
</div>
</div>
</aside>
<!-- Main Content Wrapper -->
<div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
<!-- Zone B: Header -->
<header class="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 shrink-0">
<!-- Left: Breadcrumb -->
<nav class="flex items-center text-sm text-slate-500 dark:text-slate-400">
<a class="hover:text-primary transition-colors" href="#">首页</a>
<span class="mx-2 text-slate-300 dark:text-slate-600">/</span>
<span class="text-slate-900 dark:text-slate-100 font-medium">调研会话</span>
</nav>
<!-- Right: Actions -->
<div class="flex items-center gap-4">
<button class="relative p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-all">
<span class="material-symbols-outlined">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>
</button>
<button class="p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-all">
<span class="material-symbols-outlined">light_mode</span>
</button>
<div class="h-6 w-px bg-slate-200 dark:bg-slate-700 mx-1"></div>
<button class="flex items-center gap-2 px-3 py-1.5 text-xs font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
<span class="material-symbols-outlined text-sm">help</span>
                        帮助文档
                    </button>
</div>
</header>
<!-- Zone C: Main Content Area -->
<main class="flex-1 p-8 overflow-auto bg-background-light dark:bg-background-dark">
<div class="w-full h-full bg-white dark:bg-slate-900 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 flex flex-col items-center justify-center p-12 text-center">
<div class="w-16 h-16 bg-slate-50 dark:bg-slate-800 rounded-full flex items-center justify-center mb-6 text-slate-300 dark:text-slate-600">
<span class="material-symbols-outlined text-4xl">dynamic_feed</span>
</div>
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100 mb-2">此处为动态业务页面渲染区</h2>
<p class="text-slate-500 dark:text-slate-400 max-w-md">
                        (如：调研工作台、弹窗、表单、报表等均在此区域展示)
                    </p>
<div class="mt-8 flex gap-3">
<button class="px-6 py-2.5 bg-primary text-white text-sm font-bold rounded-lg hover:opacity-90 transition-opacity shadow-lg shadow-primary/20">
                            进入工作台
                        </button>
<button class="px-6 py-2.5 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700 text-sm font-bold rounded-lg hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors">
                            了解详情
                        </button>
</div>
</div>
</main>
<!-- Zone D: Floating Layer -->
<div class="fixed bottom-8 right-8 z-50">
<button class="flex items-center gap-3 pl-4 pr-6 py-3.5 bg-primary text-white rounded-full shadow-2xl shadow-primary/40 hover:scale-105 active:scale-95 transition-all group">
<div class="relative w-8 h-8 flex items-center justify-center bg-white/20 rounded-full">
<span class="material-symbols-outlined text-white">smart_toy</span>
<span class="absolute -top-1 -right-1 flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-white"></span>
</span>
</div>
<div class="flex flex-col items-start leading-none">
<span class="text-[10px] font-bold uppercase tracking-wider opacity-70">AI Assistant</span>
<span class="text-sm font-bold">OpenClaw Copilot</span>
</div>
</button>
</div>
</div>
</div>
<script src="assets/common.js"></script>
<script>
        // 侧边栏导航高亮
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();

                // 移除所有active状态
                document.querySelectorAll('nav a').forEach(l => {
                    l.classList.remove('active-link');
                    l.classList.add('text-slate-600', 'dark:text-slate-400');
                    l.classList.remove('text-primary');
                    l.querySelector('.material-symbols-outlined')?.classList.remove('text-primary');
                    l.querySelector('.material-symbols-outlined')?.classList.add('text-slate-500');
                });

                // 添加active状态
                this.classList.add('active-link');
                this.classList.remove('text-slate-600', 'dark:text-slate-400');
                this.classList.add('text-primary');
                this.querySelector('.material-symbols-outlined')?.classList.add('text-primary');
                this.querySelector('.material-symbols-outlined')?.classList.remove('text-slate-500');

                // 更新标题
                const pageTitle = this.querySelector('span:last-child')?.textContent;
                if (pageTitle) {
                    document.querySelector('header nav span:last-child')?.textContent = pageTitle;
                }

                if (window.Toast) Toast.show(`已切换到：${pageTitle}`, 'info');
            });
        });

        // 搜索框交互
        const searchInput = document.querySelector('input[type="text"]');
        searchInput?.addEventListener('input', debounce((e) => {
            const value = e.target.value;
            if (value.trim()) {
                if (window.Toast) Toast.show(`搜索：${value}`, 'info');
            }
        }, 300));

        // 按钮点击
        document.querySelector('button.bg-primary')?.addEventListener('click', () => {
            if (window.Toast) Toast.show('正在进入工作台...', 'info');
        });

        // Copilot按钮
        document.querySelector('.fixed.bottom-8 button')?.addEventListener('click', () => {
            if (window.Toast) Toast.show('OpenClaw Copilot 已启动', 'info');
        });

        // 退出登录
        document.querySelector('button[title="退出登录"]')?.addEventListener('click', () => {
            if (confirm('确定要退出登录吗？')) {
                if (window.Toast) Toast.show('已退出登录', 'success');
            }
        });
    </script>
</body></html>
